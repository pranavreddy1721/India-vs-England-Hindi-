<head>

  <style>
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
    iframe { position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
    #loader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; display: flex; align-items: center; justify-content: center;
      z-index: 999; transition: opacity 0.8s ease; pointer-events: none;
    }
    #loader.hidden { opacity: 0; }
    .spinner {
      width: 60px; height: 60px;
      border: 5px solid rgba(255,255,255,0.1);
      border-top-color: #1f80e0;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .watermark {
      position: fixed; top: 14px; right: 16px; z-index: 9999;
      pointer-events: none; display: flex; align-items: center; gap: 5px;
      background: rgba(0,0,0,0.35); border: 1px solid rgba(0,229,255,0.25);
      border-radius: 4px; padding: 3px 8px 3px 6px;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }
    .watermark-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #00e5ff; animation: pulse 2s ease-in-out infinite; flex-shrink: 0;
    }
    .watermark-text {
      font-family: system-ui,-apple-system,sans-serif;
      font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
      color: #00e5ff; text-shadow: 0 0 8px rgba(0,229,255,0.4);
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @media(max-width:700px){ .watermark{top:8px;right:8px} .watermark-text{font-size:10px} }
  </style>
</head>
<body>
<div id="loader"><div class="spinner"></div></div>
<iframe
  id="video-frame"
  src="https://twitcasting.tv/g:107421087204174714661/embeddedplayer/live"
  sandbox="allow-scripts allow-same-origin allow-presentation"
  allow="autoplay; encrypted-media"
  allowfullscreen>
</iframe>
<div class="watermark"><div class="watermark-dot"></div><span class="watermark-text">CRICKCAST</span></div>
<script>
  (function() {
    var loader = document.getElementById('loader');
    var iframe = document.getElementById('video-frame');
    function hideLoader() {
      loader.classList.add('hidden');
      setTimeout(function() { loader.style.display = 'none'; }, 800);
    }
    iframe.addEventListener('load', function() { setTimeout(hideLoader, 300); });
    setTimeout(hideLoader, 6000);
  })();
</script>
</body>
